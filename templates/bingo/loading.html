<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando......jogo</title>
  <style>
    /* Fundo com imagem */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100%;
      background: url('https://us.123rf.com/450wm/serafima82/serafima821707/serafima82170700070/82585828-lottery-jackpot-with-tickets-wheel-coins-and-balls.jpg?ver=6');  
      background-size: cover;  
      background-position: center;  
      background-repeat: no-repeat; 
    }

    /* Preloader */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      animation: spinz 1.35s linear infinite;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8); /* leve escurecimento */
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .loader {
      border: 16px solid #efeee8;
      border-top: 16px solid #0032A0;
      border-radius: 50%;
      width: 120px;
      height: 120px;
      animation: spin 1.35s linear infinite;
      margin-bottom: 50px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); opacity:1; }
      50% { transform: rotate(360deg); opacity:1; }
      75% { transform: rotate(180deg); opacity:1; }
      100% { transform: rotate(0deg); opacity:0; }
    }

    @keyframes spinz {
      0%, 50%, 75% { opacity:1; }
      100% { opacity:0; }
    }

    /* Formas neon animadas */
    .wrap i {
      position: absolute;
      inset: 0;
      border: 5px solid transparent;
      pointer-events: none;
      transition: 0.5s;
      filter: drop-shadow(0 0 10px var(--clr))
              drop-shadow(0 0 20px var(--clr))
              drop-shadow(0 0 40px var(--clr));
    }

    .wrap i:nth-child(1) {
      border-radius: 25% 75% 41% 59% / 51% 36% 64% 49%;
      animation: rotA 8s linear infinite;
      --clr: #00fff2;
      border-color: var(--clr);
    }

    .wrap i:nth-child(2) {
      border-radius: 42% 58% 84% 16% / 51% 60% 40% 49%;
      animation: rotB 6s linear infinite;
      --clr: #ff00ff;
      border-color: var(--clr);
    }

    .wrap i:nth-child(3) {
      border-radius: 58% 42% 64% 36% / 26% 60% 40% 74%;
      animation: rotC 10s linear infinite;
      --clr: #00ff0a;
      border-color: var(--clr);
    }

    @keyframes rotA { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes rotB { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
    @keyframes rotC { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }

    .wrap:hover i {
      border-width: 6px;
      filter: drop-shadow(0 0 25px var(--clr))
              drop-shadow(0 0 45px var(--clr))
              drop-shadow(0 0 70px var(--clr));
    }

    /* Texto digitando neon */
    .typewriter {
      color: #0ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      text-shadow: 
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #ff00ff,
        0 0 40px #00ff0a;
      border-right: 3px solid #0ff;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 5s steps(30, end) 1s forwards, blink 0.8s infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 22ch; }
    }

    @keyframes blink {
      0%, 50% { border-color: #0ff; }
      50.1%, 100% { border-color: transparent; }
    }

  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="preloader" id="preloader">
    <div class="loader" id="loader"></div>

    <!-- Texto animado digitando -->
    <div class="typewriter"> Ferrari Games tech</div>

    <div class="wrap" aria-live="polite">
      <i style="--clr:#ff0057;"></i>
      <i style="--clr:#fffd44;"></i>
      <i style="--clr:#00ff0a;"></i>
    </div>
  </div>

  <script>
    let elem_preloader = document.getElementById("preloader");
    let elem_loader = document.getElementById("loader");

    // tempo ajustado para 13 segundos
    setTimeout(function() {
      elem_preloader.classList.remove("preloader");
      elem_loader.classList.remove("loader");

      // redireciona após o carregamento completo
      window.location.href = "/comprar_seu_ticket";
    }, 13000);
  </script>
</body>
</html>
