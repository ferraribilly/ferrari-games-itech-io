<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Acesso Usuários — Login e Registro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Segoe UI, Roboto, "Helvetica Neue", Arial;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 20px;
      position: relative;
    }

    /* FUNDO ANIMADO */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100dvh;
      background: url("https://res.cloudinary.com/dptprh0xk/image/upload/v1763000058/Pngtree_attractive_monkey_slot_game_character_21134749_rayvcs.png") repeat left top;
      background-size: cover;
      z-index: -2;
      animation: 40s linear infinite LoadingBarProgress;
    }

    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to right, #a8a8a8, #3d3d3d, transparent, #3d3d3d, #a8a8a8);
      background-size: 500%;
      z-index: -1;
      animation: 40s linear infinite LoadingBarProgress;
    }

    @keyframes LoadingBarProgress {
      0% { background-position: 0 0 }
      100% { background-position: 125% 0 }
    }

    .wrap {
      width: 100%;
      max-width: 500px;
      position: relative;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 100px;
      height: 100px;
      border-radius: 100%;
      object-fit: contain;
      margin-bottom: 10px;
      border: 1px solid green;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
    }

    .logo h1 {
      font-size: 1.4rem;
      color: #fff;
      text-align: center;
      font-weight: 600;
    }

    .typing-effect {
      font-family: monospace;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      border-right: .15em solid orange;
      width: 0;
      animation: typing 3.5s steps(30, end) forwards, blinking .75s step-end infinite;
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blinking { from, to { border-color: transparent } 50% { border-color: orange } }

    .card { width: 100%; }

    h2 { font-size: 1.1rem; margin-bottom: 12px; text-align: center; letter-spacing: 0.2px; }

    .field { margin-bottom: 12px; }

    label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: rgba(255,255,255,0.85); }

    input[type="text"], input[type="email"], input[type="password"], input[type="date"] {
      width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03); color: #fff; font-size: 0.98rem; outline: none;
    }

    input::placeholder { color: rgba(255,255,255,0.45); } 
    input:focus { box-shadow: 0 6px 18px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.22); }

    .btn { display: inline-block; padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 0.98rem; letter-spacing: 0.2px; }
    .primary { background: linear-gradient(45deg, #ff357a, #fff172); color: #111; }
    .secondary { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #fff; }

    .links { display: flex; justify-content: center; margin-top: 10px; }
    .links a { color: #cfcfcf; text-decoration: none; font-size: 0.9rem; }

    .message { margin-top: 8px; padding: 8px; border-radius: 8px; display: none; }
    .msg-success { background: rgba(0, 255, 120, 0.15); color: #80ffb0; }
    .msg-error { background: rgba(255, 0, 0, 0.12); color: #ffb0b0; }

    @media (max-width: 480px) { .wrap { padding: 20px; } }
  </style>
</head>

<body>
  <audio id="somAmbiente" src="https://res.cloudinary.com/dptprh0xk/video/upload/v1762638299/tell-me-what-379638_uwmki4.mp3" loop autoplay></audio>

  <div class="wrap">
    <div class="logo">
      <img src="https://res.cloudinary.com/dptprh0xk/image/upload/v1762726173/logo_dna0xx.jpg" alt="Logo do sistema">
      <p class="typing-effect">Ferrari Games itech.io</p>
      <p class="typing-effect">Jogadores e Apostadores sejam bem vindos!</p>
    </div>

    <!-- LOGIN -->
    <section class="card" id="loginSection">
      <p class="typing-effect">Login Usuários — apenas CPF</p>
      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="cpf_login">CPF</label>
          <input id="cpf_login" name="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required oninput="formatCPF(this)">
        </div>
        <div class="field"><button type="submit" class="btn primary" style="width:100%">Entrar</button></div>
        <div id="loginMsg" class="message"></div>
        <div class="links"><a href="#" onclick="toggleSection('register'); return false;">Não tem conta? Registre-se</a></div>
      </form>
    </section>

    <!-- REGISTRO -->
    <section class="card" id="registerSection" style="display:none">
      <h2>Registro Usuários</h2>
      <form id="registerForm" autocomplete="on">
        <div class="field"><label for="nome">Nome</label><input id="nome" name="nome" type="text" placeholder="Nome" required></div>
        <div class="field"><label for="sobrenome">Sobrenome</label><input id="sobrenome" name="sobrenome" type="text" placeholder="Sobrenome" required></div>
        <div class="field"><label for="cpf">CPF</label><input id="cpf" name="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required oninput="formatCPF(this)"></div>
        <div class="field"><label for="data_nascimento">Data de nascimento</label><input id="data_nascimento" name="data_nascimento" type="date" required></div>
        <div class="field"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
        <div class="field"><label for="convite_ganbista">Convite</label><input id="convite_ganbista" name="public_key_admin" type="text" placeholder="Chave pública do administrador" required></div>
        <div class="field"><label for="chave_pix">Chave Pix</label><input id="chave_pix" name="chave_pix" type="text" placeholder="Chave Pix (CPF, telefone ou e-mail)" required></div>
        <div class="field"><label for="senha">Senha</label><input id="senha" name="senha" type="password" required></div>
        <button type="submit" class="btn primary" style="width:100%">Registrar</button>
      </form>
      <div id="registerMsg" class="message"></div>
      <div class="links"><a href="#" onclick="toggleSection('login'); return false;">Já tem conta? Fazer login</a></div>
    </section>
  </div>

  <script>
    function formatCPF(input){
      let v = input.value.replace(/\D/g,'');
      v = v.replace(/(\d{3})(\d)/,'$1.$2');
      v = v.replace(/(\d{3})(\d)/,'$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
      input.value = v;
    }
  
    function toggleSection(type){
      const login = document.getElementById('loginSection');
      const register = document.getElementById('registerSection');
      if(type === 'register'){ login.style.display = 'none'; register.style.display = 'block'; }
      else { login.style.display = 'block'; register.style.display = 'none'; }
      // limpa mensagens ao trocar
      document.getElementById('loginMsg').style.display = 'none';
      document.getElementById('registerMsg').style.display = 'none';
    }
  
    function showMessage(el, text, type){
      el.style.display = 'block';
      el.innerText = text;
      el.className = 'message ' + (type === 'success' ? 'msg-success' : 'msg-error');
    }
  
    // LOGIN
    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const cpf = e.target.cpf.value.replace(/\D/g,'');
      const msg = document.getElementById('loginMsg');
      msg.style.display = 'block';
      msg.className = 'message';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({cpf})
        });
        const data = await res.json();
        if(res.ok && data.status === 'success'){
          showMessage(msg, data.message, 'success');
          // redireciona para painel
          setTimeout(()=> location.href = data.redirect || '/painel', 500);
        } else {
          showMessage(msg, data.message || 'Erro ao efetuar login', 'error');
        }
      } catch (err) {
        showMessage(msg, 'Erro de conexão', 'error');
      }
    });
  
    // REGISTRO
    document.getElementById('registerForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const formData = new FormData(e.target);
      const obj = Object.fromEntries(formData.entries());
      obj.cpf = obj.cpf.replace(/\D/g,'');
      const msg = document.getElementById('registerMsg');
      msg.style.display = 'block';
      msg.className = 'message';
      try {
        const res = await fetch('/registrar_usuario', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(obj)
        });
        const data = await res.json();
        if(res.ok && data.status === 'success'){
          showMessage(msg, data.message, 'success');
          e.target.reset();
          // redireciona direto para painel
          setTimeout(()=> location.href = '/painel', 500);
        } else {
          showMessage(msg, data.message || 'Erro ao registrar', 'error');
        }
      } catch (err) {
        showMessage(msg, 'Erro de conexão', 'error');
      }
    });
  </script>
</body>
</html>
