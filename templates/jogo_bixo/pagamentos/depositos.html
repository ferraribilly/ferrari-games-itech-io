<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depósitos</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #27ae60; /* Fundo verde escuro */
    color: #fff;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    padding: 10px;
    background-color: #1e8449;
  }

  header img {
    width: 60px;
    height: 60px;
    margin-right: 10px;
    border-radius: 50%;
    border: 1px solid #fff;
  }

  header h1 {
    font-size: 20px;
    margin: 0;
    font-family: monospace;
    flex: 1;
  }
  h1 {
  color: blue;
  text-aling: center;
  	
  }

  /* Container dos grids */
  .container {
    padding: 10px;
  }

  .grid {
    background-color: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .perfil {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 10px;
  }

  .perfil img {
    width: 80px;
    height: 80px;
    border-radius: 20%;
    object-fit: cover;
    margin-bottom: 5px;
  }



/* FUNDO ANIMADO */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100dvh;
      background: url("https://res.cloudinary.com/dptprh0xk/image/upload/v1762733060/estilo-de-vida-fotorrealista-cassino_hny2za.jpg") repeat left top;
      background-size: cover;
      z-index: -2;
      animation: 40s linear infinite LoadingBarProgress;
    }

    body::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to right, #a8a8a8, #3d3d3d, trasnparent, #3d3d3d, #a8a8a8);
      background-size: 500%;
      z-index: -1;
      animation: 40s linear infinite LoadingBarProgress;
    }

    @keyframes LoadingBarProgress {
      0% { background-position: 0 0 }
      100% { background-position: 125% 0 }
    }

    .wrap {
      width: 100%;
      max-width: 500px;
      position: relative;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 100px;
      height: 100px;
      border-radius: 100%;
      object-fit: contain;
      margin-bottom: 10px;
      border: 1px solid green;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
    }

    .logo h1 {
      font-size: 1.4rem;
      color: #fff;
      text-align: center;
      font-weight: 600;
    }

    .typing-effect {
      font-family: monospace;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      border-right: .15em solid orange;
      width: 0;
      animation: typing 3.5s steps(30, end) forwards, blinking .75s step-end infinite;
    }

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blinking { from, to { border-color: transparent } 50% { border-color: orange } }

  .perfil h2 {
    margin: 5px 0;
    font-size: 16px;
  }

  .perfil p {
    margin: 0;
    font-size: 14px;
    text-align: center;
  }

  button {
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    background-color: blue;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    margin-top: 5px;
    width:100%;
  }

  button:hover {
    background-color: #145a32;
  }

  /* Box de pagamento */
  .box {
    display: none;
    flex-direction: column;
    background-color: rgba(0,0,0,0.4);
    padding: 15px;
    margin-top: 10px;
    width: 100%;
    aling-items: center;
    border-radius: 10px;
  }

  .box input {
    padding: 10px;
    width:90%;
    border: none;
    border-radius: 5px;
    margin-bottom: 10px;
    
    
  }

  /* Código do produto */
  .codigo {
    font-size: 12px;
    margin-top: 5px;
  }

  /* Bandeiras */
  .bandeiras {
    display: flex;
    justify-content: center;
    margin-top: 10px;
    gap: 10px;
  }

  .bandeiras img {
    height: 35px;
    object-fit: contain;
  }

  /* Responsividade */
  @media (min-width: 600px) {
    .container {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .grid {
      width: 250px;
    }
  }
</style>
</head>
<body>

<header>
  <img src="https://res.cloudinary.com/dptprh0xk/image/upload/v1762733060/estilo-de-vida-fotorrealista-cassino_hny2za.jpg" alt="Logo Usuário">
  <h1 typing-effect>Depósitos Onlines</h1>
</header>

<div class="container">

  <!-- Grid 1 -->
  <div class="grid">
    <div class="perfil">
      <img src="../../../static/bichos/leao.jpg" alt="Perfil 1">
      <h2 class="typing-effect">Ferrari Black (admin)</h2>
      <p>10% de desconto no depósito R$ 30,00</p>
    </div>
    <div class="codigo">Código: PROD001</div>
    <div class="bandeiras">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQeivC8jnNcELFVs0O-S60XrNwvMEQbu_5VA&s" alt="Mastercard">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQE8JDtp_xX3VMomoRn-Wtd0sar8cVYpzhg7Q&s" alt="Visa">
      <img src="https://images.seeklogo.com/logo-png/39/2/mercadopago-nuevo-logo-png_seeklogo-397917.png" alt="Mercado Pago">
    </div>
    <button onclick="toggleBox(this)">Depositar</button>
    <div class="box">
      <input type="number" placeholder="Valor do depósito">
      <button>Gerar Pagamento</button>
    </div>
  </div>

  <!-- Grid 2 -->
  <div class="grid">
    <div class="perfil">
      <img src="../../../static/bichos/touro.jpg" alt="Perfil 2">
      <h2>Nicolas</h2>
      <p>2% de desconto no depósito R$ 10,00</p>
    </div>
    <div class="codigo">Código: PROD002</div>
    <div class="bandeiras">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQQeivC8jnNcELFVs0O-S60XrNwvMEQbu_5VA&s" alt="Mastercard">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQE8JDtp_xX3VMomoRn-Wtd0sar8cVYpzhg7Q&s" alt="Visa">
      <img src="https://images.seeklogo.com/logo-png/39/2/mercadopago-nuevo-logo-png_seeklogo-397917.png" alt="Mercado Pago">
    </div>
    <button onclick="toggleBox(this)">Depositar</button>
    <div class="box">
      <input type="number" placeholder="Valor do depósito">
      <button>Gerar Pagamento</button>
    </div>
  </div>

</div>

<script>
  function toggleBox(button) {
    const box = button.nextElementSibling;
    box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
  }
</script>

</body>
</html>
