<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pagamento Failure</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.1/css/bootstrap.min.css">
  <style>
    body {
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #fff;
      color: #222;
      border-radius: 8px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-align: center;
    }
    .qr {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
      margin: 16px auto;
    }
    .valor {
      font-weight: 700;
      margin: 8px 0 16px;
    }
    .note { font-size:12px; color:#666; margin-top:12px; }
  </style>
</head>
<body>
  <div class="card" role="main">
    <h3>Pagamento Falhou</h3>
    <p>Seu pagamento foi recusado!.</p>

    

    <p class="note">
      Esta página e direcionamento de pagamentos(failure). "Recusado".
    </p>
  </div>
</body>
</html>
